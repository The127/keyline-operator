name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: go-build-${{ runner.os }}-
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: go-build-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: ./bin
          key: bin-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: bin-${{ runner.os }}-
      - run: go mod tidy
      - run: make test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: go-build-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: ./bin
          key: bin-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: bin-${{ runner.os }}-
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - run: kind create cluster
      - run: go mod tidy && make test-e2e

  tag:
    name: Bump version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-e2e]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next tag
        id: tag
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          IFS='.' read -r major minor patch <<< "${latest#v}"
          echo "new=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
      - name: Push tag
        run: |
          git tag ${{ steps.tag.outputs.new }}
          git push origin ${{ steps.tag.outputs.new }}
