# This rule is not used by the project keyline-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over keyline.keyline.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: keyline-operator
    app.kubernetes.io/managed-by: kustomize
  name: keylinerole-admin-role
rules:
- apiGroups:
  - keyline.keyline.dev
  resources:
  - keylineroles
  verbs:
  - '*'
- apiGroups:
  - keyline.keyline.dev
  resources:
  - keylineroles/status
  verbs:
  - get
