# Adds namespace to all resources.
namespace: keyline-operator-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "keyline-operator-wordpress".
# Note that it should also match with the prefix (string)
# in the markercomments described above, to make this scaffolding work.
namePrefix: keyline-operator-

# Labels to add to all resources and selectors.
# Note that it is not possible to add labels to the following resource types once they are created in the cluster:
# - Namespace
# - PersistentVolume
# - ClusterRole
# - ClusterRoleBinding
# - metrics_auth_role_binding.yaml
#labels:
#  - pairs:
#      app.kubernetes.io/name: keyline-operator

resources:
- ../crd
- ../rbac
- ../manager
# [METRICS] To enable the controller manager metrics service, uncomment the following line.
- metrics_service.yaml

# Uncomment the patches line if you enable Validating Webhooks configurations
patches:
# [METRICS] The following patch will enable the metrics endpoint using HTTPS and the port :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment

# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
#- path: manager_webhook_patch.yaml

# [CERTMANAGER] To enable cert-manager, uncomment all sections with 'CERTMANAGER'. 'WEBHOOK' components are required.
#- path: webhookcainjection_patch.yaml
