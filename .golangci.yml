version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - copyloopvar
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    revive:
      rules:
        - name: comment-spacings

  exclusions:
    rules:
      - path: "^api/"
        linters:
          - lll
      - path: "^internal/"
        linters:
          - lll
      - path: "_test\\.go$"
        linters:
          - dupl
      - path: "^test/"
        linters:
          - revive
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
